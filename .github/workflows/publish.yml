name: Publish to PyPI

# Publishes to PyPI on a GitHub Release via trusted publishing (OIDC) — no API
# token or password is stored. The PyPI project must have a trusted publisher
# (or pending publisher) registered for this repository, the workflow filename
# `publish.yml`, and the `pypi` environment. Lint/test live in ci.yml.

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Build sdist and wheel
        run: uv build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing (OIDC)
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
